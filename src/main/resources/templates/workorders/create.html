<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新建工单 - MES</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>🏭 MES</h2>
        <p>制造执行系统</p>
      </div>
      <ul class="nav-menu">
        <li><a th:href="@{/}">📊 仪表盘</a></li>
        <li><a th:href="@{/workorders}" class="active">📋 工单管理</a></li>
        <li><a th:href="@{/schedule}">📅 生产排程</a></li>
        <li><a th:href="@{/quality}">✅ 质量检验</a></li>
        <li><a th:href="@{/equipment}">⚙️ 设备监控</a></li>
        <li><a th:href="@{/dashboard/overview}">📈 数据统计</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <header class="top-bar">
        <h1>📋 新建工单</h1>
        <div class="user-info"><span>👤 admin</span></div>
      </header>
      <div class="content">
        <div class="form-card">
          <form
            th:action="@{/workorders}"
            th:object="${workOrder}"
            method="post"
          >
            <div class="form-group">
              <label>工单号</label>
              <input type="text" th:field="*{orderNo}" required="required" />
              <span
                th:if="${#fields.hasErrors('orderNo')}"
                th:errors="*{orderNo}"
                class="error"
              ></span>
            </div>
            <div class="form-group">
              <label>产品名称</label>
              <input
                type="text"
                th:field="*{productName}"
                required="required"
              />
              <span
                th:if="${#fields.hasErrors('productName')}"
                th:errors="*{productName}"
                class="error"
              ></span>
            </div>
            <div class="form-group">
              <label>数量</label>
              <input
                type="number"
                th:field="*{quantity}"
                required="required"
                min="1"
              />
              <span
                th:if="${#fields.hasErrors('quantity')}"
                th:errors="*{quantity}"
                class="error"
              ></span>
            </div>
            <div class="form-group">
              <label>状态</label>
              <select th:field="*{status}">
                <option
                  th:each="s : ${statuses}"
                  th:value="${s}"
                  th:text="${s}"
                ></option>
              </select>
            </div>
            <div class="form-group">
              <label>优先级</label>
              <select th:field="*{priority}">
                <option
                  th:each="p : ${priorities}"
                  th:value="${p}"
                  th:text="${p}"
                ></option>
              </select>
            </div>
            <div class="form-group">
              <label>计划开始时间</label>
              <input type="datetime-local" th:field="*{plannedStart}" />
            </div>
            <div class="form-group">
              <label>计划结束时间</label>
              <input type="datetime-local" th:field="*{plannedEnd}" />
            </div>
            <div class="form-group">
              <label>负责人</label>
              <input type="text" th:field="*{assignedTo}" />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-success">创建工单</button>
              <a th:href="@{/workorders}" class="btn">取消</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
