<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新建检验 - MES</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>🏭 MES</h2>
        <p>制造执行系统</p>
      </div>
      <ul class="nav-menu">
        <li><a th:href="@{/}">📊 仪表盘</a></li>
        <li><a th:href="@{/workorders}">📋 工单管理</a></li>
        <li><a th:href="@{/schedule}">📅 生产排程</a></li>
        <li><a th:href="@{/quality}" class="active">✅ 质量检验</a></li>
        <li><a th:href="@{/equipment}">⚙️ 设备监控</a></li>
        <li><a th:href="@{/dashboard/overview}">📈 数据统计</a></li>
      </ul>
    </nav>
    <main class="main-content">
      <header class="top-bar">
        <h1>✅ 新建检验记录</h1>
        <div class="user-info"><span>👤 admin</span></div>
      </header>
      <div class="content">
        <div class="form-card">
          <form th:action="@{/quality}" method="post">
            <div class="form-group">
              <label>关联工单</label>
              <select name="orderId" required="required">
                <option value="">请选择工单</option>
                <option
                  th:each="wo : ${workOrders}"
                  th:value="${wo.id}"
                  th:text="${wo.orderNo + ' - ' + wo.productName}"
                ></option>
              </select>
            </div>
            <div class="form-group">
              <label>检验员</label>
              <input type="text" name="inspector" required="required" />
            </div>
            <div class="form-group">
              <label>检验结果</label>
              <select name="result">
                <option
                  th:each="r : ${results}"
                  th:value="${r}"
                  th:text="${r}"
                ></option>
              </select>
            </div>
            <div class="form-group">
              <label>缺陷数量</label>
              <input type="number" name="defectCount" value="0" min="0" />
            </div>
            <div class="form-group">
              <label>缺陷描述</label>
              <textarea name="defectDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>检验时间</label>
              <input
                type="datetime-local"
                name="inspectionTime"
                required="required"
              />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-success">提交检验</button>
              <a th:href="@{/quality}" class="btn">取消</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
